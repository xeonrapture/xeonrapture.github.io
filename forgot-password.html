<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password</title>
  <link rel="stylesheet" href="/shared/style.css" />
</head>
<body class="wr-scope">

<div id="nav"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared/auth.js"></script>
<script src="/shared/nav.js"></script>

<main class="wrap">
  <h1>Forgot Password</h1>

  <p>Enter your email and we'll send you a link to reset your password.</p>

  <input id="email" type="email" placeholder="Email" />

  <div class="wr-mt-1">
    <button id="sendReset" aria-label="Send reset link" title="Send reset link"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 2L11 13"></path><path d="M22 2L15 22 11 13 2 9l20-7z"></path></svg><span>Send reset link</span></button>
  </div>

  <div class="wr-mt-1">
    <a href="/login.html">Back to login</a>
  </div>

  <div id="msg" class="muted mono wr-mt-1">&nbsp;</div>
</main>

<script>
  const sb = window.supabaseClient;
  const emailInput = document.getElementById("email");
  const msg = document.getElementById("msg");
  const sendResetBtn = document.getElementById("sendReset");

  function showMessage(text, isError = false) {
    msg.textContent = text;
    msg.style.color = isError ? "red" : "green";
  }

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) location.href = "/dashboard.html";
  })();

  sendResetBtn.onclick = async () => {
    const email = emailInput.value.trim();
    if (!email) {
      showMessage("Please enter your email address.", true);
      return;
    }

    showMessage("Sending reset link...");

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: "https://app.xeonrapture.com/reset-password.html"
    });

    if (error) {
      showMessage(error.message, true);
    } else {
      showMessage("Check your email for a password reset link (and make sure to check your Spam folder).");
      sendResetBtn.disabled = true;
    }
  };
</script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="/shared/style.css" />
</head>
<body class="wr-scope">

<div id="nav"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared/auth.js"></script>
<script src="/shared/nav.js"></script>

<main class="wrap">
  <h1>Reset Password</h1>

  <div id="loadingState" class="muted mono">Verifying reset link…</div>

  <div id="formState" class="hidden">
    <input id="password" type="password" placeholder="New password" />
    <input id="confirmPassword" type="password" placeholder="Confirm new password" />

    <div class="wr-mt-1">
      <button id="savePassword" aria-label="Save new password" title="Save new password"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h12l2 2v14H5z"></path><path d="M8 4v6h8V4"></path><path d="M8 16h8"></path></svg><span>Save new password</span></button>
    </div>
  </div>

  <div id="doneState" class="hidden">
    <p>Password updated successfully.</p>
    <a href="/dashboard.html">Go to dashboard</a>
  </div>

  <div id="errorState" class="hidden">
    <p class="muted">This reset link is invalid or has expired.</p>
    <a href="/forgot-password.html">Request a new reset link</a>
  </div>

  <div id="msg" class="muted mono wr-mt-1">&nbsp;</div>
</main>

<script>
  const sb = window.supabaseClient;
  const loadingState = document.getElementById("loadingState");
  const formState = document.getElementById("formState");
  const doneState = document.getElementById("doneState");
  const errorState = document.getElementById("errorState");
  const passwordInput = document.getElementById("password");
  const confirmPasswordInput = document.getElementById("confirmPassword");
  const savePasswordBtn = document.getElementById("savePassword");
  const msg = document.getElementById("msg");

  function showMessage(text, isError = false) {
    msg.textContent = text;
    msg.style.color = isError ? "red" : "green";
  }

  // Supabase sends the user to this page with tokens in the URL hash.
  // We listen for the PASSWORD_RECOVERY event to confirm the session is valid.
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === "PASSWORD_RECOVERY") {
      loadingState.classList.add("hidden");
      formState.classList.remove("hidden");
    } else if (event === "SIGNED_IN" && session) {
      // Already handled if PASSWORD_RECOVERY fires first; this is a fallback.
    }
  });

  // If there is no recovery event within a short window, show the error state.
  const recoveryTimeout = setTimeout(() => {
    if (!formState.classList.contains("hidden")) return;
    loadingState.classList.add("hidden");
    errorState.classList.remove("hidden");
  }, 5000);

  savePasswordBtn.onclick = async () => {
    const password = passwordInput.value;
    const confirmPassword = confirmPasswordInput.value;

    if (!password || !confirmPassword) {
      showMessage("Both password fields are required.", true);
      return;
    }

    if (password !== confirmPassword) {
      showMessage("Passwords do not match.", true);
      return;
    }

    if (password.length < 6) {
      showMessage("Password must be at least 6 characters.", true);
      return;
    }

    showMessage("Saving…");
    clearTimeout(recoveryTimeout);

    const { error } = await sb.auth.updateUser({ password });

    if (error) {
      showMessage(error.message, true);
    } else {
      formState.classList.add("hidden");
      doneState.classList.remove("hidden");
      msg.textContent = "";
    }
  };
</script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>XR Dice Roller</title>

  <link rel="stylesheet" href="/shared/style.css">
</head>

<body class="tools-scope">
  <div id="nav"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared/auth.js"></script>
<script src="/shared/nav.js"></script>


  <main class="wrap">
    <h1>Dice Roller</h1>
    <p class="muted">Pick dice count + die size + modifier. Optionally view individual rolls.</p>

    <div class="card">
      <div class="row">
        <label for="count1">Dice amount 1</label>
        <input id="count1" type="number" min="1" step="1" value="2">
      </div>

      <div class="row">
        <label for="die1">Dice type 1</label>
        <select id="die1">
          <option value="2">d2</option>
          <option value="4">d4</option>
          <option value="6" selected>d6</option>
          <option value="8">d8</option>
          <option value="10">d10</option>
          <option value="12">d12</option>
          <option value="20">d20</option>
          <option value="50">d50</option>
          <option value="100">d100</option>
        </select>
      </div>

      <div class="row">
        <label for="count2">Dice amount 2</label>
        <input id="count2" type="number" min="1" step="1" value="0">
      </div>

      <div class="row">
        <label for="die2">Dice type 2</label>
        <select id="die2">
          <option value="2">d2</option>
          <option value="4">d4</option>
          <option value="6">d6</option>
          <option value="8" selected>d8</option>
          <option value="10">d10</option>
          <option value="12">d12</option>
          <option value="20">d20</option>
          <option value="50">d50</option>
          <option value="100">d100</option>
        </select>
      </div>

      <div class="row">
        <label>Modifier</label>
        <div class="inline">
          <select id="modSign" class="mod-sign">
            <option value="+">+</option>
            <option value="-">−</option>
          </select>
          <input id="modValue" class="mod-value" type="number" step="1" value="0">
          <span class="muted">e.g. +2 or −1</span>
        </div>
      </div>

      <div class="row">
        <label for="actionDiff">Action Difficulty</label>
        <div class="inline">
          <select id="actionDiff">
            <option value="">— none —</option>
            <option value="10">Easy (10)</option>
            <option value="15">Kinda Easy (15)</option>
            <option value="20">Hard (20)</option>
            <option value="25">Very Hard (25)</option>
            <option value="30">Tricky (30)</option>
            <option value="35">Very Tricky (35)</option>
            <option value="40">Extreme (40)</option>
            <option value="45">Xtra Extreme (45)</option>
            <option value="50">Elite (50)</option>
            <option value="55">Super Elite (55)</option>
            <option value="60">Immortal (60)</option>
            <option value="65">Intense Immortal (65)</option>
            <option value="70">Dragon (70)</option>
            <option value="80">Godlike (80)</option>
            <option value="90">Greater Godlike (90)</option>
            <option value="100">Impossible (100)</option>
          </select>
          <input id="diffValue" type="number" step="1" placeholder="—" style="width:5rem">
        </div>
      </div>

      <div class="actions">
        <button id="rollBtn" aria-label="Roll" title="Roll"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="5" width="14" height="14" rx="2"></rect><circle cx="9" cy="9" r="1"></circle><circle cx="15" cy="15" r="1"></circle><circle cx="12" cy="12" r="1"></circle></svg><span>Roll</span></button>
        <button id="roll10Btn" aria-label="Roll ten times" title="Roll ten times"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="6" width="9" height="9" rx="1.5"></rect><rect x="12" y="9" width="9" height="9" rx="1.5"></rect></svg><span>Roll x10</span></button>
        <button id="clearBtn" aria-label="Clear" title="Clear"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 14l7-7a2 2 0 0 1 3 0l8 8a2 2 0 0 1 0 3l-3 3H10z"></path><path d="M12 20l6-6"></path><path d="M3 21h7"></path></svg><span>Clear</span></button>
      </div>

      <div class="resultGrid">
        <div class="muted">Sum of rolls</div>
        <p id="sumDice" class="mono">—</p>

        <div class="muted">Modifier applied</div>
        <p id="modApplied" class="mono">—</p>

        <div class="muted">Total</div>
        <p id="total" class="mono">—</p>

        <div class="muted" id="outcomeLabel" style="display:none">Outcome</div>
        <p id="outcome" class="mono" style="display:none">—</p>
      </div>

      <details class="details-block">
        <summary>Show individual rolls</summary>
        <div class="mono muted details-output" id="rollList">—</div>
      </details>

      <hr class="divider">

      <h3>Recent Rolls</h3>
      <div id="history" class="mono muted">
        <div class="muted">No rolls yet.</div>
      </div>

    </div>
  </main>

  <script>
    const el = (id) => document.getElementById(id);

    const history = [];
    const MAX_HISTORY = 10;
    
    function addToHistory(res) {
      history.unshift(res);
      if (history.length > MAX_HISTORY) history.pop();
      renderHistory();
    }
    
    function renderHistory() {
      const host = el("history");
      host.innerHTML = "";
    
      if (history.length === 0) {
        host.innerHTML = `<div class="muted">No rolls yet.</div>`;
        return;
      }
    
      history.forEach((h, idx) => {
        const div = document.createElement("div");
        div.className = "inline";
        div.style.marginBottom = "0.25rem";
    
        div.innerHTML = `
          <span>
            ${h.count1}d${h.sides1}
            ${h.count2 > 0 ? ` + ${h.count2}d${h.sides2}` : ""}
            ${h.mod > 0 ? "+" : ""}${h.mod != 0 ? h.mod : ""}
            → <b>${h.total}</b>
          </span>

          <button data-i="${idx}" aria-label="Reroll" title="Reroll"><svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 7h-6a5 5 0 0 0-5 5"></path><path d="M4 17h6a5 5 0 0 0 5-5"></path><path d="M17 4l3 3-3 3"></path><path d="M7 14l-3 3 3 3"></path></svg><span>Reroll</span></button>
        `;
    
        div.querySelector("button").addEventListener("click", () => {
          const r = rollOnce(
            h.count1,
            h.sides1,
            h.count2,
            h.sides2,
            h.mod
          );

          renderSingle(r);
          addToHistory(r);
        });
    
        host.appendChild(div);
      });
    }


    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function parseInputs() {
      const count1 = Number(el("count1").value);
      const sides1 = Number(el("die1").value);
      const count2 = Number(el("count2").value);
      const sides2 = Number(el("die2").value);
      const sign = el("modSign").value;
      const modVal = Number(el("modValue").value);

      if (!Number.isFinite(count1) || count1 < 1) throw new Error("Dice amount must be 1 or more.");
      if (!Number.isFinite(sides1) || sides1 < 2) throw new Error("Die size must be 2 or more.");
      if (!Number.isFinite(count2) || count2 < 0) throw new Error("Dice amount must be 1 or more.");
      if (!Number.isFinite(sides2) || sides2 < 2) throw new Error("Die size must be 2 or more.");
      if (!Number.isFinite(modVal)) throw new Error("Modifier must be a number.");

      const mod = (sign === "-") ? -Math.abs(modVal) : Math.abs(modVal);
      return { count1, sides1, count2, sides2, mod };
    }

    function rollOnce(count1, sides1, count2, sides2, mod) {
      const rolls = [];
      let sum = 0;

      for (let i = 0; i < count1; i++) {
        const r = randInt(1, sides1);
        rolls.push(r);
        sum += r;
      }

      for (let i = 0; i < count2; i++) {
        const r = randInt(1, sides2);
        rolls.push(r);
        sum += r;
      }

      return {
        count1,
        sides1,
        count2,
        sides2,
        rolls,
        sum,
        mod,
        total: sum + mod
      };
    }

    function getOutcome(total, difficulty) {
      if (total >= difficulty + 5) return "Strong Success";
      if (total >= difficulty)     return "Success";
      if (total >= difficulty - 5) return "Mixed Success";
      return "Failure";
    }

    function renderSingle(res) {
      el("sumDice").textContent = String(res.sum);
      el("modApplied").textContent = (res.mod >= 0 ? `+${res.mod}` : `${res.mod}`);
      el("total").textContent = String(res.total);
      el("rollList").textContent = res.rolls.join(", ");

      const diff = Number(el("diffValue").value);
      if (diff) {
        const outcome = getOutcome(res.total, diff);
        el("outcome").textContent = outcome;
        el("outcome").style.display = "";
        el("outcomeLabel").style.display = "";
      } else {
        el("outcome").style.display = "none";
        el("outcomeLabel").style.display = "none";
      }
    }

    function renderAvg(count1, sides1, count2, sides2, mod, trials, avgSum, avgTotal) {
      el("sumDice").textContent = avgSum.toFixed(2);
      el("modApplied").textContent = (mod >= 0 ? `+${mod}` : `${mod}`);
      el("total").textContent = avgTotal.toFixed(2);
      el("rollList").textContent = `Averaged over ${trials} trials (no single roll list).`;
      el("outcome").style.display = "none";
      el("outcomeLabel").style.display = "none";
    }

    function clearAll() {
      el("sumDice").textContent = "—";
      el("modApplied").textContent = "—";
      el("total").textContent = "—";
      el("rollList").textContent = "—";
      el("outcome").style.display = "none";
      el("outcomeLabel").style.display = "none";
    }

    el("rollBtn").addEventListener("click", () => {
      try {
        const { count1, sides1, count2, sides2, mod } = parseInputs();
        const res = rollOnce(count1, sides1, count2, sides2, mod);
        renderSingle(res);
        addToHistory(res);

      } catch (e) {
        el("total").textContent = "ERR";
        el("rollList").textContent = `Error: ${e.message || String(e)}`;
      }
    });

    el("roll10Btn").addEventListener("click", () => {
      try {
        const { count1, sides1, count2, sides2, mod } = parseInputs();
        const trials = 10;

        let sumS = 0;
        let sumT = 0;

        for (let i = 0; i < trials; i++) {
          const r = rollOnce(count1, sides1, count2, sides2, mod);
          sumS += r.sum;
          sumT += r.total;
        }

        renderAvg(count1, sides1, count2, sides2, mod, trials, sumS / trials, sumT / trials);
      } catch (e) {
        el("total").textContent = "ERR";
        el("rollList").textContent = `Error: ${e.message || String(e)}`;
      }
    });

    el("clearBtn").addEventListener("click", clearAll);

    el("actionDiff").addEventListener("change", () => {
      const v = el("actionDiff").value;
      el("diffValue").value = v !== "" ? v : "";
    });

    // Enter key rolls
    ["count1", "count2", "modValue"].forEach(id => {
      el(id).addEventListener("keydown", (e) => {
        if (e.key === "Enter") el("rollBtn").click();
      });
    });
  </script>
</body>
</html>
